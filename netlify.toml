# (resume from saved offset via kpi_events progress rows).
[functions."index-tennessee"]
  schedule = "15 2 * * *"
  timeout = 26

[functions."index-massachusetts"]
  schedule = "15 6 * * *"
  timeout = 26

[functions."index-maryland"]
