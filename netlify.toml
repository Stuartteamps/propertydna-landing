  timeout = 26

[functions."index-tahoeluxury"]
  schedule = "45 11 * * *"
  timeout = 26

# INDEXER ORCHESTRATOR — the 24/7 catch-up driver. Each indexer requires
# POST + x-internal-key, which the Netlify scheduler can't send, so scheduling
# them directly just 401'd. This one scheduled function fires every indexer WITH
# the internal key each hour, so they all advance in parallel and resume from
# their kpi_events checkpoints. Watch progress at /.netlify/functions/index-progress.
# Trigger manually to kickstart/burst: /run-all-indexers?key=INTERNAL_API_KEY
[functions."run-all-indexers"]
  # Every 30 min — aggressive national catch-up toward full assessor coverage.
  # Each indexer self-caps its batch + resumes from checkpoint, so this is the
  # throughput throttle. Faster is possible but risks county-API rate-limit bans
  # (which HALT indexing) — burst harder on demand via the manual ?key= trigger.
  schedule = "*/30 * * * *"
  timeout = 26

# WEEKLY NEWSLETTER — now sent via our own Resend infra (send-weekly-newsletter),
# NOT Constant Contact (CC subscription cancelled 2026-06-30).
#
# It is NOT scheduled here as a Netlify cron because a single invocation cannot
# send the whole list within the function timeout (734 contacts × sequential
# Resend calls > 60s). Instead the cloud routine "Weekly Newsletter — Internal
# Resend Send" (trig_01AsA7hwhQd8mDebcCuoGPSU) drives it every Thursday 4:20 PM PT,
# paginating ?offset= (50/batch) until done, passing x-internal-key. The function
# is auth-gated, so a header-less Netlify cron could not call it anyway.
# [functions."send-weekly-newsletter"]
#   schedule = "20 23 * * 4"

# send-cc-newsletter (Constant Contact) RETIRED 2026-06-30 — CC subscription
# cancelled. Superseded by the internal Resend send above. Left disabled for
# reference only; do not re-enable.
# [functions."send-cc-newsletter"]
#   schedule = "20 23 * * 4"
#   timeout = 60

# auto-refresh-cc-token RETIRED 2026-06-30 — CC cancelled, no OAuth token to refresh.
# [functions."auto-refresh-cc-token"]
#   schedule = "59 7 * * 4"

# newsletter-preflight RETIRED 2026-06-30 — it only checked CC OAuth token
# freshness, which is moot now that CC is cancelled (it would false-alert
# "token missing"). The internal Resend send has no token to pre-warm.
# [functions."newsletter-preflight"]
#   schedule = "0 14 * * 3"

# Fri 16:00 UTC = 9 AM PDT — verifies Thursday's send actually happened. Reads
# the newsletter_sent KPI that send-weekly-newsletter writes (Resend path), so
# it still confirms the internal send. CC-specific checks are now no-ops.
[functions."newsletter-postflight"]
  schedule = "0 16 * * 5"

[functions."drip-sequence"]
  schedule = "0 * * * *"

# Daily ops digest — 01:00 UTC = 6:00 PM PDT, 5:00 PM PST
# Emails Dan a daily summary of agent activity, new leads, errors.
[functions."ops-daily-digest"]
  schedule = "0 1 * * *"

[functions."key-watchdog"]
  schedule = "0 16 * * 1"

# Wed 15:00 UTC = 8 AM PDT — reminder email to Dan to update FlexMLS
# share links in newsletter_links before Thursday's send.
[functions."weekly-mls-reminder"]
  schedule = "0 15 * * 3"

# SUPERSEDED 2026-05-28: weekly newsletter imagery is now generated locally by
# tools/image-gen/gen-newsletter.ts (gpt-image-1) and committed to the repo at
# /social/newsletter/latest-*.jpg (served from Netlify CDN). This DALL-E ->
# Supabase Storage cron is disabled because (a) Supabase Storage was 544/522 in
