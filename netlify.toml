[build]
  base = "app/frontend"
  command = "pnpm install --no-frozen-lockfile && NODE_OPTIONS=--max-old-space-size=4096 pnpm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20.17.0"
  PNPM_VERSION = "9.15.0"
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"
  VITE_N8N_WEBHOOK_URL = "https://dillabean.app.n8n.cloud/webhook/homefax/report"
  SECRETS_SCAN_OMIT_PATHS = "node_modules/**,app/frontend/node_modules/**,**/*.d.ts"

[functions]
  directory = "../../netlify/functions"
  node_bundler = "esbuild"

[functions."index-properties"]
  timeout = 26

[functions."index-florida"]
  timeout = 26

# send-weekly-newsletter was firing on the same Thursday schedule as
# send-cc-newsletter, causing every contact to receive 2 identical emails
# 30s apart — a strong spam-folder signal. Schedule removed; the function
# remains callable manually via HTTP POST.
# [functions."send-weekly-newsletter"]
#   schedule = "20 23 * * 4"

# Auto-send PAUSED 2026-05-28 per Dan: newsletter must be previewed to
# stuartteamps@gmail.com and explicitly approved before each full-list send.
# Re-enable by uncommenting the schedule. Function stays callable via HTTP
# (manual send on approval) and in ccTest preview mode.
[functions."send-cc-newsletter"]
  schedule = "20 23 * * 4"
  timeout = 60

[functions."auto-refresh-cc-token"]
  schedule = "59 7 * * 4"

# Wed 14:00 UTC = 7 AM PDT — 33h before Thursday's 4:20 PM PT newsletter send.
# Checks CC OAuth token freshness, refreshes if <40h to expiry, alerts Dan
# if refresh fails or token is missing entirely.
[functions."newsletter-preflight"]
  schedule = "0 14 * * 3"

# Fri 16:00 UTC = 9 AM PDT — verifies Thursday's send actually happened
# (CC API path preferred, Resend fallback flagged as warning).
[functions."newsletter-postflight"]
  schedule = "0 16 * * 5"

[functions."drip-sequence"]
  schedule = "0 * * * *"

# Daily ops digest — 01:00 UTC = 6:00 PM PDT, 5:00 PM PST
# Emails Dan a daily summary of agent activity, new leads, errors.
[functions."ops-daily-digest"]
  schedule = "0 1 * * *"

[functions."key-watchdog"]
  schedule = "0 16 * * 1"

# Wed 15:00 UTC = 8 AM PDT — reminder email to Dan to update FlexMLS
# share links in newsletter_links before Thursday's send.
[functions."weekly-mls-reminder"]
  schedule = "0 15 * * 3"

# SUPERSEDED 2026-05-28: weekly newsletter imagery is now generated locally by
# tools/image-gen/gen-newsletter.ts (gpt-image-1) and committed to the repo at
# /social/newsletter/latest-*.jpg (served from Netlify CDN). This DALL-E ->
# Supabase Storage cron is disabled because (a) Supabase Storage was 544/522 in
# the 2026-05-27/28 outage and (b) OPENAI_API_KEY was pulled from Netlify env
# (AWS Lambda 4KB ceiling). Key now lives only in tools/image-gen/.env locally.
# [functions."generate-newsletter-images"]
#   schedule = "0 14 * * 3"
#   timeout = 60

# Daily 9 AM PT — checks for cc_blast_sent events exactly 7 days old and
# fires non-opener follow-ups (different angle, same offer). Respects Dan's
# "no follow-up for 7 days" rule strictly.
[functions."cc-followup-scheduler"]
  schedule = "0 16 * * *"

# Daily 10 AM PT — nurture inbound form submitters who didn't subscribe.
# 3-touch sequence: Day 2 (educate), Day 5 (market move), Day 10 (personal).
[functions."submitter-drip"]
  schedule = "0 17 * * *"

# Wed 13:00 UTC = 6 AM PDT — sync website-side unsubscribes into the CC list.
# Closes the CAN-SPAM gap where someone who unsubs via our site still gets the
# CC newsletter. Bulk operation up to 5K emails per call.
[functions."sync-unsubscribes-to-cc"]
  schedule = "0 13 * * 3"
  timeout = 60

# Hourly — Tom Ferry 8-touch cadence for open-house leads (QR/web sign-ins).
# Step 0 fires instantly via capture-open-house-lead.js. Cron handles 1..7:
# T+1d SMS · T+2d email (off-market matches) · T+4d SMS · T+7d/14d/21d email · T+30d loop-close.
[functions."open-house-followup"]
  schedule = "0 * * * *"
  timeout = 60

# Every 15 min — YouTube engagement automation. Scans new comments on the
# PropertyDNA channel, classifies intent (scan request / app question /
# agent grievance / general question), auto-replies with the right CTA,
# forwards scan requests to Dan's inbox. Skips gracefully if no YouTube
# OAuth token is wired yet.
[functions."youtube-engagement"]
  schedule = "*/15 * * * *"
  timeout = 30

# Daily 13:00 UTC = 6 AM PDT. Re-pulls DNA score + estimated value for
# every watched property; emails users when score or value moves beyond
# their per-property threshold. Idempotent — 20h cooldown per property.
[functions."watch-list-diff"]
  schedule = "0 13 * * *"
  timeout = 60

# Twice daily 14:00 + 22:00 UTC = 6 AM PDT + 2 PM PDT. Scans 5 high-value
# subreddits for homebuyer-intent keywords. Surfaces matches to Dan with
# a suggested reply. Dan posts manually for authenticity.
[functions."reddit-monitor"]
  schedule = "0 14,22 * * *"
  timeout = 60

# Apple Universal Links — must NOT be SPA-redirected, must have correct Content-Type
[[redirects]]
  from = "/.well-known/apple-app-site-association"
  to = "/.well-known/apple-app-site-association"
  status = 200
  force = true

[[headers]]
  for = "/.well-known/apple-app-site-association"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=300"

# Android App Links assetlinks.json (same idea for Android Universal Links)
[[redirects]]
  from = "/.well-known/assetlinks.json"
  to = "/.well-known/assetlinks.json"
  status = 200
  force = true

# Dynamic sitemap — always reflects the current DB state (dossiers, architects,
# neighborhoods, blog, tickers) so search + AI crawlers see the full index.
[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200
  force = true

# RSS feed of verified luxury dossiers — for press/agent subscription
[[redirects]]
  from = "/dossier-feed.xml"
  to = "/.netlify/functions/dossier-feed"
  status = 200
  force = true

# Public JSON API for dossier inventory
[[redirects]]
  from = "/api/dossiers/*"
  to = "/.netlify/functions/api-dossiers/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/dossiers"
  to = "/.netlify/functions/api-dossiers"
  status = 200
  force = true

[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=300"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Anti-piracy: keep report URLs out of search engines + AI crawlers
[[headers]]
  for = "/report/view/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet"
    Referrer-Policy = "no-referrer"
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/report/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    X-Frame-Options = "SAMEORIGIN"

# Block AI training crawlers across the whole site
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
