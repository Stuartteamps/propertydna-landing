[build]
  base = "app/frontend"
  command = "pnpm install --no-frozen-lockfile && NODE_OPTIONS=--max-old-space-size=4096 pnpm run build"
  publish = "dist"
  # Netlify's default "skip if no content change" hashes only the publish dir
  # (app/frontend/dist), so function-only commits (netlify/functions/**) were
  # silently dropped and never deployed. This custom ignore builds whenever the
  # functions, frontend, or config change, and skips pure tools/docs commits.
  # Exit 0 = skip build; non-zero = build. Repo-root pathspecs (':/') because
  # the ignore command runs from base = app/frontend.
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- ':/netlify/functions' ':/app/frontend' ':/netlify.toml'"

[build.environment]
  NODE_VERSION = "20.17.0"
  PNPM_VERSION = "9.15.0"
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"
  VITE_N8N_WEBHOOK_URL = "https://dillabean.app.n8n.cloud/webhook/homefax/report"
  SECRETS_SCAN_OMIT_PATHS = "node_modules/**,app/frontend/node_modules/**,**/*.d.ts"

[functions]
  directory = "../../netlify/functions"
  node_bundler = "esbuild"

# Social Publisher agent — generates a mission-driven daily post via Claude and
# (in publish mode) hands it to social-poster. Daily 10am PT (17:00 UTC).
# Default mode = draft (emails Dan the post). After /admin/oauth is granted,
# set env SOCIAL_AGENT_MODE=publish and it posts autonomously — no code change.
[functions."social-agent"]
  schedule = "0 17 * * *"
  timeout = 26

# Audience Engagement OS agents. Default ENGAGEMENT_MODE=dryrun (email Dan a
# preview); set ENGAGEMENT_MODE=live to actually reach users. Staggered daily.
[functions."steward-agent"]
  schedule = "30 16 * * *"
  timeout = 26

[functions."advocate-agent"]
  schedule = "30 18 * * *"
  timeout = 26

[functions."index-properties"]
  timeout = 26

[functions."index-florida"]
  timeout = 26

# East Coast / mid-Atlantic indexers (added 2026-06-15).
# Staggered every ~4h so only ONE indexer fires at a time — IO budget concern
# after the 2026-05-27 disk-IO exhaustion incident. All indexers idempotent
# (resume from saved offset via kpi_events progress rows).
[functions."index-tennessee"]
  schedule = "15 2 * * *"
  timeout = 26

[functions."index-massachusetts"]
  schedule = "15 6 * * *"
  timeout = 26

[functions."index-maryland"]
  schedule = "15 10 * * *"
  timeout = 26

[functions."index-dc"]
  schedule = "15 14 * * *"
  timeout = 26

[functions."index-georgia"]
  schedule = "15 18 * * *"
  timeout = 26

# NY indexer is already coded; re-arm now that compute upgraded post-incident.
[functions."index-newyork"]
  schedule = "15 22 * * *"
  timeout = 26

# Wave 2 nationwide indexers (added 2026-06-16). Staggered every 4h on the :30
# mark so they NEVER collide with Wave 1's :15 slots — IO budget protection
# after the 2026-05-27 disk-IO exhaustion incident. All indexers idempotent
# (resume from saved offset via kpi_events progress rows).
[functions."index-newjersey"]
  schedule = "30 0 * * *"
  timeout = 26

[functions."index-virginia"]
  schedule = "30 4 * * *"
  timeout = 26

[functions."index-northcarolina"]
  schedule = "30 8 * * *"
  timeout = 26

[functions."index-southcarolina"]
  schedule = "30 12 * * *"
  timeout = 26

[functions."index-coloradoluxury"]
  schedule = "30 16 * * *"
  timeout = 26

[functions."index-utahluxury"]
  schedule = "30 20 * * *"
  timeout = 26

# Ski/resort small counties fill the odd-hour off-peak slots.
[functions."index-wyomingluxury"]
  schedule = "45 3 * * *"
  timeout = 26

[functions."index-tahoeluxury"]
  schedule = "45 11 * * *"
  timeout = 26

# send-weekly-newsletter was firing on the same Thursday schedule as
# send-cc-newsletter, causing every contact to receive 2 identical emails
# 30s apart — a strong spam-folder signal. Schedule removed; the function
# remains callable manually via HTTP POST.
# [functions."send-weekly-newsletter"]
#   schedule = "20 23 * * 4"

# Auto-send PAUSED 2026-05-28 per Dan: newsletter must be previewed to
# stuartteamps@gmail.com and explicitly approved before each full-list send.
# Re-enable by uncommenting the schedule. Function stays callable via HTTP
# (manual send on approval) and in ccTest preview mode.
[functions."send-cc-newsletter"]
  schedule = "20 23 * * 4"
  timeout = 60

[functions."auto-refresh-cc-token"]
  schedule = "59 7 * * 4"

# Wed 14:00 UTC = 7 AM PDT — 33h before Thursday's 4:20 PM PT newsletter send.
# Checks CC OAuth token freshness, refreshes if <40h to expiry, alerts Dan
# if refresh fails or token is missing entirely.
[functions."newsletter-preflight"]
  schedule = "0 14 * * 3"

# Fri 16:00 UTC = 9 AM PDT — verifies Thursday's send actually happened
# (CC API path preferred, Resend fallback flagged as warning).
[functions."newsletter-postflight"]
  schedule = "0 16 * * 5"

[functions."drip-sequence"]
  schedule = "0 * * * *"

# Daily ops digest — 01:00 UTC = 6:00 PM PDT, 5:00 PM PST
# Emails Dan a daily summary of agent activity, new leads, errors.
[functions."ops-daily-digest"]
  schedule = "0 1 * * *"

[functions."key-watchdog"]
  schedule = "0 16 * * 1"

# Wed 15:00 UTC = 8 AM PDT — reminder email to Dan to update FlexMLS
# share links in newsletter_links before Thursday's send.
[functions."weekly-mls-reminder"]
  schedule = "0 15 * * 3"

# SUPERSEDED 2026-05-28: weekly newsletter imagery is now generated locally by
# tools/image-gen/gen-newsletter.ts (gpt-image-1) and committed to the repo at
# /social/newsletter/latest-*.jpg (served from Netlify CDN). This DALL-E ->
# Supabase Storage cron is disabled because (a) Supabase Storage was 544/522 in
# the 2026-05-27/28 outage and (b) OPENAI_API_KEY was pulled from Netlify env
# (AWS Lambda 4KB ceiling). Key now lives only in tools/image-gen/.env locally.
# [functions."generate-newsletter-images"]
#   schedule = "0 14 * * 3"
#   timeout = 60

# Daily 9 AM PT — checks for cc_blast_sent events exactly 7 days old and
# fires non-opener follow-ups (different angle, same offer). Respects Dan's
# "no follow-up for 7 days" rule strictly.
[functions."cc-followup-scheduler"]
  schedule = "0 16 * * *"

# Daily 10 AM PT — nurture inbound form submitters who didn't subscribe.
# 3-touch sequence: Day 2 (educate), Day 5 (market move), Day 10 (personal).
[functions."submitter-drip"]
  schedule = "0 17 * * *"

# Daily 13:00 UTC = 6 AM PDT — sync website-side unsubscribes into CC. Closes
# the CAN-SPAM gap where someone who unsubs via our site still gets the CC
# newsletter. Processes up to 250 contacts per run (per-contact lookup+PATCH);
# daily cadence clears the ~3.3K backlog in ~13 days, then keeps up forward.
[functions."sync-unsubscribes-to-cc"]
  schedule = "0 13 * * *"
  timeout = 60

# Hourly — Tom Ferry 8-touch cadence for open-house leads (QR/web sign-ins).
# Step 0 fires instantly via capture-open-house-lead.js. Cron handles 1..7:
# T+1d SMS · T+2d email (off-market matches) · T+4d SMS · T+7d/14d/21d email · T+30d loop-close.
[functions."open-house-followup"]
  schedule = "0 * * * *"
  timeout = 60

# Every 15 min — YouTube engagement automation. Scans new comments on the
# PropertyDNA channel, classifies intent (scan request / app question /
# agent grievance / general question), auto-replies with the right CTA,
# forwards scan requests to Dan's inbox. Skips gracefully if no YouTube
# OAuth token is wired yet.
[functions."youtube-engagement"]
  schedule = "*/15 * * * *"
  timeout = 30

# Daily 13:00 UTC = 6 AM PDT. Re-pulls DNA score + estimated value for
# every watched property; emails users when score or value moves beyond
# their per-property threshold. Idempotent — 20h cooldown per property.
[functions."watch-list-diff"]
  schedule = "0 13 * * *"
  timeout = 60

# Twice daily 14:00 + 22:00 UTC = 6 AM PDT + 2 PM PDT. Scans 5 high-value
# subreddits for homebuyer-intent keywords. Surfaces matches to Dan with
# a suggested reply. Dan posts manually for authenticity.
[functions."reddit-monitor"]
  schedule = "0 14,22 * * *"
  timeout = 60

# Daily 13:30 UTC = 6:30 AM PDT. Autonomous mission status report
# emailing Dan a one-page snapshot of indexing progress, engagement,
# mission impact, and pending action items. Keeps the autonomous loop
# transparent without Dan having to ask.
[functions."daily-mission-report"]
  schedule = "30 13 * * *"
  timeout = 30

# Mondays 14:00 UTC = 7 AM PDT. Catches the "social feed went stale"
# failure class — buffer agent's most-recent-past-entry fallback was
# silently re-serving identical posts for 6 days when the calendar ran
# out (root cause: calendar ended 6/9, kept replaying through 6/15).
# Alerts Dan if <10 future entries remain OR <=2 unique images in last 7d.
[functions."calendar-watchdog"]
  schedule = "0 14 * * 1"
  timeout = 15

# Daily 02:00 UTC = 7 PM PDT. End-of-day log: commits shipped, content
# moved, KPIs delta, and the top action items still needed from Dan.
# The "stay on track" loop Dan asked for.
[functions."eod-log"]
  schedule = "0 2 * * *"
  timeout = 30

# Apple Universal Links — must NOT be SPA-redirected, must have correct Content-Type
[[redirects]]
  from = "/.well-known/apple-app-site-association"
  to = "/.well-known/apple-app-site-association"
  status = 200
  force = true

[[headers]]
  for = "/.well-known/apple-app-site-association"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=300"

# Android App Links assetlinks.json (same idea for Android Universal Links)
[[redirects]]
  from = "/.well-known/assetlinks.json"
  to = "/.well-known/assetlinks.json"
  status = 200
  force = true

# Dynamic sitemap — always reflects the current DB state (dossiers, architects,
# neighborhoods, blog, tickers) so search + AI crawlers see the full index.
[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200
  force = true

# RSS feed of verified luxury dossiers — for press/agent subscription
[[redirects]]
  from = "/dossier-feed.xml"
  to = "/.netlify/functions/dossier-feed"
  status = 200
  force = true

# Public JSON API for dossier inventory
[[redirects]]
  from = "/api/dossiers/*"
  to = "/.netlify/functions/api-dossiers/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/dossiers"
  to = "/.netlify/functions/api-dossiers"
  status = 200
  force = true

[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=300"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Anti-piracy: keep report URLs out of search engines + AI crawlers
[[headers]]
  for = "/report/view/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet"
    Referrer-Policy = "no-referrer"
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/report/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    X-Frame-Options = "SAMEORIGIN"

# Block AI training crawlers across the whole site
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
