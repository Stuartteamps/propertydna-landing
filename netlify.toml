# Daily 9 AM PT — checks for cc_blast_sent events exactly 7 days old and
# fires non-opener follow-ups (different angle, same offer). Respects Dan's
# "no follow-up for 7 days" rule strictly.
[functions."cc-followup-scheduler"]
  # PAUSED 2026-06-25 (churn control — was chasing non-openers with a 7-day follow-up,
  # a top unsubscribe driver). Re-enable after list is segmented to engaged opt-ins.
  # schedule = "0 16 * * *"

# Daily 10 AM PT — nurture inbound form submitters who didn't subscribe.
# 3-touch sequence: Day 2 (educate), Day 5 (market move), Day 10 (personal).
[functions."submitter-drip"]
  schedule = "0 17 * * *"

# Daily 13:00 UTC = 6 AM PDT — sync website-side unsubscribes into CC. Closes
# the CAN-SPAM gap where someone who unsubs via our site still gets the CC
# newsletter. Processes up to 250 contacts per run (per-contact lookup+PATCH);
# daily cadence clears the ~3.3K backlog in ~13 days, then keeps up forward.
[functions."sync-unsubscribes-to-cc"]
  schedule = "0 13 * * *"
  timeout = 60

# Hourly — Tom Ferry 8-touch cadence for open-house leads (QR/web sign-ins).
# Step 0 fires instantly via capture-open-house-lead.js. Cron handles 1..7:
# T+1d SMS · T+2d email (off-market matches) · T+4d SMS · T+7d/14d/21d email · T+30d loop-close.
[functions."open-house-followup"]
  schedule = "0 * * * *"
  timeout = 60

# Every 15 min — YouTube engagement automation. Scans new comments on the
# PropertyDNA channel, classifies intent (scan request / app question /
# agent grievance / general question), auto-replies with the right CTA,
# forwards scan requests to Dan's inbox. Skips gracefully if no YouTube
# OAuth token is wired yet.
[functions."youtube-engagement"]
  # DISABLED 2026-06-25 (0 social platforms OAuth-connected — was burning runs). Re-enable when connected.
  # schedule = "*/15 * * * *"
  timeout = 30

# Daily 13:00 UTC = 6 AM PDT. Re-pulls DNA score + estimated value for
# every watched property; emails users when score or value moves beyond
# their per-property threshold. Idempotent — 20h cooldown per property.
[functions."watch-list-diff"]
  schedule = "0 13 * * *"
  timeout = 60

# Twice daily 14:00 + 22:00 UTC = 6 AM PDT + 2 PM PDT. Scans 5 high-value
# subreddits for homebuyer-intent keywords. Surfaces matches to Dan with
# a suggested reply. Dan posts manually for authenticity.
[functions."reddit-monitor"]
  schedule = "0 14,22 * * *"
  timeout = 60

# Daily 13:30 UTC = 6:30 AM PDT. Autonomous mission status report
# emailing Dan a one-page snapshot of indexing progress, engagement,
# mission impact, and pending action items. Keeps the autonomous loop
# transparent without Dan having to ask.
[functions."daily-mission-report"]
  schedule = "30 13 * * *"
  timeout = 30

# Mondays 14:00 UTC = 7 AM PDT. Catches the "social feed went stale"
# failure class — buffer agent's most-recent-past-entry fallback was
# silently re-serving identical posts for 6 days when the calendar ran
# out (root cause: calendar ended 6/9, kept replaying through 6/15).
# Alerts Dan if <10 future entries remain OR <=2 unique images in last 7d.
[functions."calendar-watchdog"]
  schedule = "0 14 * * 1"
  timeout = 15

# Daily 02:00 UTC = 7 PM PDT. End-of-day log: commits shipped, content
# moved, KPIs delta, and the top action items still needed from Dan.
# The "stay on track" loop Dan asked for.
[functions."eod-log"]
  schedule = "0 2 * * *"
  timeout = 30

# Apple Universal Links — must NOT be SPA-redirected, must have correct Content-Type
[[redirects]]
  from = "/.well-known/apple-app-site-association"
  to = "/.well-known/apple-app-site-association"
  status = 200
  force = true

[[headers]]
  for = "/.well-known/apple-app-site-association"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=300"

# Android App Links assetlinks.json (same idea for Android Universal Links)
[[redirects]]
  from = "/.well-known/assetlinks.json"
  to = "/.well-known/assetlinks.json"
  status = 200
  force = true

# Dynamic sitemap — always reflects the current DB state (dossiers, architects,
# neighborhoods, blog, tickers) so search + AI crawlers see the full index.
[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200
  force = true

# RSS feed of verified luxury dossiers — for press/agent subscription
[[redirects]]
  from = "/dossier-feed.xml"
  to = "/.netlify/functions/dossier-feed"
  status = 200
  force = true

# Public JSON API for dossier inventory
[[redirects]]
  from = "/api/dossiers/*"
  to = "/.netlify/functions/api-dossiers/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/dossiers"
  to = "/.netlify/functions/api-dossiers"
  status = 200
  force = true

[[headers]]
  for = "/.well-known/assetlinks.json"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=300"

# Public property bundle (non-PII) — what the frontend fetchPublicProperty() calls.
[[redirects]]
  from = "/api/property/*"
  to = "/.netlify/functions/public-property/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/property"
  to = "/.netlify/functions/public-property"
  status = 200
  force = true

# Developer / AI-tool JSON API (comps, valuation, scores)
[[redirects]]
  from = "/api/v1/property/*"
  to = "/.netlify/functions/api-property/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/v1/market/*"
  to = "/.netlify/functions/api-market/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/v1/search"
  to = "/.netlify/functions/api-search"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Anti-piracy: keep report URLs out of search engines + AI crawlers
[[headers]]
  for = "/report/view/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet"
    Referrer-Policy = "no-referrer"
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/report/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    X-Frame-Options = "SAMEORIGIN"

# Block AI training crawlers across the whole site
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
