[build]
  base = "app/frontend"
  command = "pnpm install --no-frozen-lockfile && NODE_OPTIONS=--max-old-space-size=4096 pnpm run build"
  publish = "dist"
  # Netlify's default "skip if no content change" hashes only the publish dir
  # (app/frontend/dist), so function-only commits (netlify/functions/**) were
  # silently dropped and never deployed. This custom ignore builds whenever the
  # functions, frontend, or config change, and skips pure tools/docs commits.
  # Exit 0 = skip build; non-zero = build. Repo-root pathspecs (':/') because
  # the ignore command runs from base = app/frontend.
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- ':/netlify/functions' ':/app/frontend' ':/netlify.toml'"

[build.environment]
  NODE_VERSION = "20.17.0"
  PNPM_VERSION = "9.15.0"
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD = "1"
  VITE_N8N_WEBHOOK_URL = "https://dillabean.app.n8n.cloud/webhook/homefax/report"
  SECRETS_SCAN_OMIT_PATHS = "node_modules/**,app/frontend/node_modules/**,**/*.d.ts"

[functions]
  directory = "../../netlify/functions"
  node_bundler = "esbuild"

# enrich-report — in-house replacement for the crash-prone n8n cloud workflow.
# Fired by queue-report (and recover-stuck-reports): RentCast valuation+comps ->
# save-report (Census/FEMA/USGS/CalFire/DNA). Needs headroom for RentCast +
# save-report's downstream calls; not scheduled (HTTP-invoked).
[functions."enrich-report"]
  timeout = 26

# backtest-accuracy — ?live=1 recomputes the CURRENT engine as-of each sale date
# over thousands of CV solds (paginated DB pull + per-subject computeValuation).
# Needs headroom beyond the 10s default; internal wall-clock guard stops at ~22s.
[functions."backtest-accuracy"]
  timeout = 26

# Social Publisher agent — generates a mission-driven daily post via Claude and
# (in publish mode) hands it to social-poster. Daily 10am PT (17:00 UTC).
# Default mode = draft (emails Dan the post). After /admin/oauth is granted,
# set env SOCIAL_AGENT_MODE=publish and it posts autonomously — no code change.
[functions."social-agent"]
  # DISABLED 2026-06-25 (0 social platforms OAuth-connected — was burning runs). Re-enable when connected.
  # schedule = "0 17 * * *"
  timeout = 26

# Audience Engagement OS agents. Default ENGAGEMENT_MODE=dryrun (email Dan a
# preview); set ENGAGEMENT_MODE=live to actually reach users. Staggered daily.
# Advocate runs FIRST (9am PT) so a safety alert claims the user's daily slot
# before Steward/Historian — the frequency cap then blocks the lower-priority
# agents for anyone Advocate just warned. Advocate itself bypasses the cap.
# growth-agent — daily distribution engine. Generates ready-to-fire guerrilla
# content (Reddit/X/IG) promoting /price-check and emails it to the owner every
# morning (8:07 AM PT). PropertyDNA-branded, no personal name. Auto-posts once a
# social account is connected + GROWTH_AGENT_MODE=publish.
[functions."growth-agent"]
  schedule = "7 15 * * *"
  timeout = 26

[functions."advocate-agent"]
  schedule = "0 16 * * *"
  timeout = 26

[functions."steward-agent"]
  schedule = "30 16 * * *"
  timeout = 26

[functions."historian-agent"]
  schedule = "0 17 * * *"
  timeout = 26

# Weekly cadence agents (staggered Mon/Wed/Fri) — lower frequency by design.
[functions."market-agent"]
  schedule = "0 16 * * 1"
  timeout = 26

[functions."connector-agent"]
  schedule = "0 19 * * 3"
  timeout = 26

[functions."ambassador-agent"]
  schedule = "0 20 * * 5"
  timeout = 26

[functions."index-properties"]
  timeout = 26

[functions."index-florida"]
  timeout = 26

# pull-solds: ground-truth ingest for the back-test. Pulls recently SOLD
# listings from RentCast /v1/listings/sale and writes them to `properties`
# (back-test ground-truth source) + `property_history` (when APN is
# resolvable via property_master lookup). Fire per market; no schedule
# while we tune.
[functions."pull-solds"]
  timeout = 26

