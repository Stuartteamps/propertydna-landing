                "text": "Yes. The PropertyDNA iOS app is 100% free for homebuyers and homeowners. Every feature — valuation, risk analysis, permit history, comparable sales, neighborhood scoring — is unlocked at no charge. There are no in-app purchases, no subscriptions, and no upsells in the iOS app."
