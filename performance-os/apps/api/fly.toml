# Arete API on Fly.io (personal, always-on). Deploy: `fly launch --copy-config --now` then
# `fly deploy`. Set secrets with `fly secrets set SECRET_KEY=... DATABASE_URL=...`.
app = "arete-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  ENV = "production"
  # Production default: Claude Sonnet 5 for food-vision / coaching. Set the key with
  # `fly secrets set AI_PROVIDER_API_KEY=<anthropic key>`. Falls back cleanly to a clear
  # error only if the key is missing; local dev stays on mock via .env.
  AI_PROVIDER = "anthropic"
  AI_MODEL = "claude-sonnet-5"
  HEALTH_PROVIDER = "mock"
  CALENDAR_PROVIDER = "mock"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  method = "GET"
  path = "/api/health"
  interval = "30s"
  timeout = "5s"
