# Arete API on Fly.io (personal, always-on). Deploy: `fly launch --copy-config --now` then
# `fly deploy`. Set secrets with `fly secrets set SECRET_KEY=... DATABASE_URL=...`.
app = "arete-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  ENV = "production"
  AI_PROVIDER = "mock"
  HEALTH_PROVIDER = "mock"
  CALENDAR_PROVIDER = "mock"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  method = "GET"
  path = "/api/health"
  interval = "30s"
  timeout = "5s"
